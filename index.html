function chromaKey(img){
  const c=document.createElement("canvas"); c.width=img.naturalWidth; c.height=img.naturalHeight;
  const x=c.getContext("2d"); x.drawImage(img,0,0);
  let d; try{d=x.getImageData(0,0,c.width,c.height);}catch(e){return{cv:c,w:c.width,h:c.height};}
  const p=d.data,W=c.width,H=c.height;
  // sample the ACTUAL background colour from the four corner patches (robust to magenta gradients/vignette)
  function patch(cx,cy){let r=0,g=0,b=0,n=0; for(let yy=cy;yy<cy+8;yy++)for(let xx=cx;xx<cx+8;xx++){const i=(yy*W+xx)*4;r+=p[i];g+=p[i+1];b+=p[i+2];n++;} return [r/n,g/n,b/n];}
  const cs=[patch(0,0),patch(W-8,0),patch(0,H-8),patch(W-8,H-8)];
  let br=0,bg=0,bb=0; for(const q of cs){br+=q[0];bg+=q[1];bb+=q[2];} br/=4;bg/=4;bb/=4;
  const TOL=80, T2=TOL*TOL;
  const d2=(r,g,b)=>{const dr=r-br,dg=g-bg,db=b-bb;return dr*dr+dg*dg+db*db;};
  // magenta key test — always strip the magenta backdrop regardless of sprite size / corner sampling
  const isMag=(r,g,b)=> r>110 && b>80 && g < Math.min(r,b)*0.80;
  // GLOBAL pass: kill every magenta-ish pixel (handles big sprites + enclosed gaps the flood can't reach)
  for(let i=0;i<p.length;i+=4){ if(isMag(p[i],p[i+1],p[i+2])) p[i+3]=0; }
  // flood-fill connected background from every border pixel (handles non-magenta uniform backdrops too)
  const seen=new Uint8Array(W*H), st=[];
  for(let xx=0;xx<W;xx++){st.push(xx);st.push((H-1)*W+xx);}
  for(let yy=0;yy<H;yy++){st.push(yy*W);st.push(yy*W+W-1);}
  while(st.length){const idx=st.pop(); if(seen[idx])continue; seen[idx]=1; const i=idx*4;
    if(p[i+3]!==0 && d2(p[i],p[i+1],p[i+2])>T2 && !isMag(p[i],p[i+1],p[i+2]))continue; p[i+3]=0; const xx=idx%W,yy=(idx/W)|0;
    if(xx>0)st.push(idx-1); if(xx<W-1)st.push(idx+1); if(yy>0)st.push(idx-W); if(yy<H-1)st.push(idx+W);}
  // edge feather + de-spill on retained pixels still near the bg colour or pinkish
  for(let i=0;i<p.length;i+=4){ if(p[i+3]===0)continue; const dd=d2(p[i],p[i+1],p[i+2]); const g=p[i+1];
    if(p[i]>g+30&&p[i+2]>g+20){p[i]=(p[i]+g)>>1; p[i+2]=(p[i+2]+g)>>1; p[i+3]=Math.max(0,p[i+3]-40);}
    else if(dd<T2*2.2){ const f=Math.max(0,(dd-T2)/(T2*1.2)); p[i+3]=Math.round(p[i+3]*Math.min(1,f+0.12)); } }
  x.putImageData(d,0,0);
  let minX=W,minY=H,maxX=0,maxY=0,found=false;
  for(let i=0;i<p.length;i+=4){ if(p[i+3]>28){found=true;const px=(i/4)%W,py=(i/4/W)|0;if(px<minX)minX=px;if(px>maxX)maxX=px;if(py<minY)minY=py;if(py>maxY)maxY=py;}}
  if(!found)return{cv:c,w:W,h:H};
  const tw=maxX-minX+1,th=maxY-minY+1,t=document.createElement("canvas");t.width=tw;t.height=th;
  t.getContext("2d").drawImage(c,minX,minY,tw,th,0,0,tw,th); return{cv:t,w:tw,h:th};
}

}
function render(){ ctx.setTransform(scale*dpr,0,0,scale*dpr,0,0); ctx.clearRect(0,0,VW,VH);
  if(state==="loading"){ drawBackground();ctx.fillStyle="rgba(3,6,12,0.6)";ctx.fillRect(0,0,VW,VH);ctx.textAlign="center";
    ctx.fillStyle="#eafff4";ctx.font="bold 40px Trebuchet MS";ctx.fillText(STR.title,VW/2,VH/2-10);
    const f=aTotal?aDone/aTotal:0;ctx.fillStyle="#16361f";ctx.fillRect(VW/2-160,VH/2+20,320,14);ctx.fillStyle="#39ff8b";ctx.fillRect(VW/2-160,VH/2+20,320*f,14);
    ctx.fillStyle="#9fe7c4";ctx.font="14px Trebuchet MS";ctx.fillText("RECLAIMING MEMORY... "+Math.round(f*100)+"%",VW/2,VH/2+56);ctx.textAlign="left"; return; }
  if(state==="title"){drawTitle();return;}
  if(mopedMode){ drawMoped(); if(flash>0){ctx.fillStyle="rgba(255,255,255,"+clamp(flash,0,0.6)+")";ctx.fillRect(0,0,VW,VH);} if(state==="shipfade"){const a=fadeT>36?(72-fadeT)/36:fadeT/36;ctx.fillStyle="rgba(0,0,0,"+clamp(a,0,1)+")";ctx.fillRect(0,0,VW,VH);} if(state==="cutscene"||state==="recall")drawDialogue(); if(state==="paused")drawCenter(STR.paused,"",STR.resume_hint,"#9fe7c4"); if(state==="gameover")drawCenter(STR.game_over,"",STR.retry,"#e23b4e"); if(state==="clear")drawCenter(STR.level4_clear,STR.level4_clear_sub,"PRESS ENTER / TAP","#39ff8b"); return; }
  let sx=0,sy=0; if(shake>0.4){sx=rnd(-shake,shake);sy=rnd(-shake,shake);}
  ctx.save();ctx.translate(sx,sy);
  drawBackground(); if(level===2)drawShip(); drawPlatforms(); if(level===3)drawL3Props(); if(level===3)drawCat(); if(level===2)drawShadows();
  if(dred.t>0){ const dx=(dred.door||dred.x)-cam.x; const prog=clamp((240-dred.t)/22,0,1)*clamp(dred.t/22,0,1);
    const a=clamp(prog*2.2,0,1), bob=Math.sin(now*0.005)*2, top=(dred.top||GROUND_Y-118), shedH=GROUND_Y-top;
    if(sprites.rastaman){ const s=sprites.rastaman, H=shedH*0.58, W=s.w*(H/s.h);
      ctx.save(); ctx.globalAlpha=a; ctx.drawImage(s.cv, Math.round(dx-W*0.5), Math.round((GROUND_Y - shedH*0.14 + bob) - H), W, H); ctx.restore(); } }
  if(lady.active){ const lx=lady.x-cam.x; const lk=(Math.floor(lady.t/6)%2===0)?"lady_run1":"lady_run2"; const la=clamp(lady.t/12,0,1)*clamp((280-lady.t)/34,0,1);
    if(sprites[lk]||sprites.lady_run1)drawSprite(sprites[lk]?lk:"lady_run1",lx,GROUND_Y-2,108,false,la); }
  drawPickups(); drawGhosts();
  for(const e of enemies)if(e.fly)drawEnemy(e);
  for(const e of enemies)if(!e.fly&&e.type!=="dog"&&e.y<=player.y)drawEnemy(e);
  drawPlayer();
  if(player.crouch&&!player.dead){ for(const pf of platforms){ if(pf.cover&&Math.abs(player.x-pf.x)<pf.w/2+14){ const s2=sprites[pf.sprite]; if(s2){ctx.drawImage(s2.cv,(pf.x-cam.x)-pf.w/2,pf.top,pf.w,GROUND_Y-pf.top+5);} } } }
  for(const e of enemies)if(!e.fly&&e.type!=="dog"&&e.y>player.y)drawEnemy(e);
  for(const e of enemies)if(e.type==="dog")drawEnemy(e);
  drawSearchlights(); drawProjectiles(); drawSlashArcs(); drawParticles(); drawFloaters(); if(level===2)drawRain();
  ctx.restore();
  if(flash>0){ctx.fillStyle="rgba(180,255,210,"+clamp(flash,0,0.5)+")";ctx.fillRect(0,0,VW,VH);}
  if(state==="shipfade"){const a=fadeT>36?(72-fadeT)/36:fadeT/36; ctx.fillStyle="rgba(0,0,0,"+clamp(a,0,1)+")"; ctx.fillRect(0,0,VW,VH);}
  const vg=ctx.createRadialGradient(VW/2,VH/2,VH*0.3,VW/2,VH/2,VH*0.85);vg.addColorStop(0,"rgba(0,0,0,0)");vg.addColorStop(1,"rgba(0,0,0,0.5)");ctx.fillStyle=vg;ctx.fillRect(0,0,VW,VH);
  if((player.blindT|0)>0){ const a=clamp(player.blindT/100,0,1)*(0.55+0.35*Math.abs(Math.sin(now*0.02))); ctx.fillStyle="rgba(255,255,255,"+a+")"; ctx.fillRect(0,0,VW,VH); }
  drawHUD();
  if(bossTaunt>0){ctx.save();ctx.globalAlpha=clamp(bossTaunt/60,0,1);ctx.textAlign="center";ctx.fillStyle="rgba(0,0,0,0.55)";ctx.fillRect(0,VH/2-54,VW,74);
    ctx.fillStyle="#ff6b5a";ctx.font="italic 18px Trebuchet MS";wrapCenter(STR.lt_taunt_text,VW/2,VH/2-20,VW-160,24);ctx.restore();ctx.textAlign="left";}
  if(state==="cutscene"||state==="recall")drawDialogue();
  if(state==="paused")drawCenter(STR.paused,"",STR.resume_hint,"#9fe7c4");
  if(state==="gameover")drawCenter(STR.game_over,"",STR.retry,"#e23b4e");
  if(state==="shop")drawShop();
  if(state==="clear")drawCenter(level===3?STR.level3_clear:level>=2?STR.level2_clear:STR.level_clear, level===3?STR.level3_clear_sub:level>=2?STR.level2_clear_sub:STR.level_clear_sub,"PRESS ENTER / TAP","#39ff8b");
}
function frame(t){ requestAnimationFrame(frame); now=t; pollPad();
  let dt=t-last;last=t;if(dt>100)dt=100;acc+=dt;let guard=0;
  while(acc>=STEP&&guard<5){step();acc-=STEP;guard++;pressed.clear();}
  render();
  if(devOn){const d=document.getElementById("dev");if(d)d.textContent=Math.round(1000/(dt||16))+"fps ent:"+enemies.length+" "+state;}
}
requestAnimationFrame(frame);
})();

</script>
